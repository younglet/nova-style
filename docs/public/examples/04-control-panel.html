<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>案例 04 - 智能家居控制台</title>
  <link rel="stylesheet" href="nova-style.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ========== 顶部导航 ========== -->
  <div class="bg-gray-800 text-white p-4 flex justify-between items-center">
    <div class="text-lg font-bold">🏠 智能家居</div>
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-green-500"></span>
      <span class="text-sm" id="deviceCount">0 台设备开启</span>
    </div>
  </div>

  <div class="p-4">

    <!-- ========== 数据概览 ========== -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="bg-white p-3 rounded-lg shadow text-center">
        <div class="text-xs text-gray-500">室温</div>
        <div id="temp" class="text-xl font-bold">24°C</div>
      </div>
      <div class="bg-white p-3 rounded-lg shadow text-center">
        <div class="text-xs text-gray-500">湿度</div>
        <div id="humi" class="text-xl font-bold text-blue-500">62%</div>
      </div>
      <div class="bg-white p-3 rounded-lg shadow text-center">
        <div class="text-xs text-gray-500">PM2.5</div>
        <div id="pm" class="text-xl font-bold text-green-500">35</div>
      </div>
    </div>

    <!-- ========== 设备控制 ========== -->
    <h2 class="text-lg font-bold mb-3">设备控制</h2>

    <div class="grid grid-cols-2 gap-3">

      <!-- 客厅灯 -->
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="flex justify-between items-center mb-3">
          <div class="font-bold">💡 客厅灯</div>
          <span id="light-led" class="w-2 h-2 rounded-full bg-gray-300"></span>
        </div>
        <div class="flex gap-2">
          <button onclick="toggle('light', true)"  class="flex-1 py-2 rounded bg-green-500 text-white text-sm cursor-pointer">开</button>
          <button onclick="toggle('light', false)" class="flex-1 py-2 rounded bg-gray-200 text-gray-700 text-sm cursor-pointer">关</button>
        </div>
      </div>

      <!-- 空调 -->
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="flex justify-between items-center mb-3">
          <div class="font-bold">❄️ 空调</div>
          <span id="ac-led" class="w-2 h-2 rounded-full bg-gray-300"></span>
        </div>
        <div class="flex gap-2">
          <button onclick="toggle('ac', true)"  class="flex-1 py-2 rounded bg-blue-500 text-white text-sm cursor-pointer">开</button>
          <button onclick="toggle('ac', false)" class="flex-1 py-2 rounded bg-gray-200 text-gray-700 text-sm cursor-pointer">关</button>
        </div>
      </div>

      <!-- 风扇 -->
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="flex justify-between items-center mb-3">
          <div class="font-bold">🌀 风扇</div>
          <span id="fan-led" class="w-2 h-2 rounded-full bg-gray-300"></span>
        </div>
        <div class="flex gap-2">
          <button onclick="toggle('fan', true)"  class="flex-1 py-2 rounded bg-blue-500 text-white text-sm cursor-pointer">开</button>
          <button onclick="toggle('fan', false)" class="flex-1 py-2 rounded bg-gray-200 text-gray-700 text-sm cursor-pointer">关</button>
        </div>
      </div>

      <!-- 加湿器 -->
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="flex justify-between items-center mb-3">
          <div class="font-bold">💧 加湿器</div>
          <span id="humid-led" class="w-2 h-2 rounded-full bg-gray-300"></span>
        </div>
        <div class="flex gap-2">
          <button onclick="toggle('humid', true)"  class="flex-1 py-2 rounded bg-blue-500 text-white text-sm cursor-pointer">开</button>
          <button onclick="toggle('humid', false)" class="flex-1 py-2 rounded bg-gray-200 text-gray-700 text-sm cursor-pointer">关</button>
        </div>
      </div>

    </div>

    <!-- ========== 一键操作 ========== -->
    <button onclick="allOff()" class="w-full py-3 rounded bg-red-500 text-white cursor-pointer mt-4 transition">
      🚫 全部关闭
    </button>

    <button onclick="allOn()" class="w-full py-3 rounded bg-green-500 text-white cursor-pointer mt-2 transition">
      ✅ 全部开启
    </button>

  </div>

  <script>
    // ===== 用一个对象保存所有设备状态 =====
    const state = { light: false, ac: false, fan: false, humid: false }

    // ===== 切换单个设备 =====
    function toggle(device, on) {
      state[device] = on
      const led = document.getElementById(device + '-led')
      led.className = on
        ? 'w-2 h-2 rounded-full bg-green-500'
        : 'w-2 h-2 rounded-full bg-gray-300'
      updateCount()
    }

    // ===== 全部关闭 =====
    function allOff() {
      Object.keys(state).forEach(d => toggle(d, false))
    }

    // ===== 全部开启 =====
    function allOn() {
      Object.keys(state).forEach(d => toggle(d, true))
    }

    // ===== 更新顶部设备计数 =====
    function updateCount() {
      const on = Object.values(state).filter(v => v).length
      document.getElementById('deviceCount').textContent = on + ' 台设备开启'
    }
  </script>

</body>
</html>
