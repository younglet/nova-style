<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>案例 01 - 静态数据卡片</title>
  <link rel="stylesheet" href="nova-style.css">
</head>
<body class="bg-gray-50 p-4">

  <h1 class="text-2xl font-bold mb-2">📊 今日环境数据</h1>
  <p class="text-sm text-gray-500 mb-4">纯 HTML + CSS，没有 JS</p>

  <!-- ========== 卡片网格 ========== -->
  <div class="grid grid-cols-3 gap-4">

    <!-- 温度 -->
    <div class="bg-white p-4 rounded-lg shadow text-center">
      <div class="text-sm text-gray-500">温度</div>
      <div class="text-3xl font-bold mt-2">23.5°C</div>
    </div>

    <!-- 湿度 -->
    <div class="bg-white p-4 rounded-lg shadow text-center">
      <div class="text-sm text-gray-500">湿度</div>
      <div class="text-3xl font-bold mt-2 text-blue-500">65%</div>
    </div>

    <!-- 光照 -->
    <div class="bg-white p-4 rounded-lg shadow text-center">
      <div class="text-sm text-gray-500">光照</div>
      <div class="text-3xl font-bold mt-2 text-yellow-500">420 lx</div>
    </div>

    <!-- 设备连接 -->
    <div class="bg-white p-4 rounded-lg shadow">
      <div class="text-sm text-gray-500 mb-2">设备连接</div>
      <div class="flex items-center">
        <span class="w-3 h-3 rounded-full bg-green-500"></span>
        <span class="ml-2 text-sm text-gray-700">全部在线 (5/5)</span>
      </div>
    </div>

    <!-- 空气质量 -->
    <div class="bg-white p-4 rounded-lg shadow">
      <div class="text-sm text-gray-500 mb-2">空气质量</div>
      <div class="flex items-center">
        <span class="px-2 py-1 rounded bg-green-100 text-green-700 text-xs">优</span>
        <span class="ml-2 text-sm text-gray-700">PM2.5: 28</span>
      </div>
    </div>

    <!-- 警告 -->
    <div class="bg-yellow-100 p-4 rounded-lg shadow border border-yellow-500">
      <div class="text-xs text-yellow-700">⚠️ 提示</div>
      <div class="text-sm text-gray-700 mt-1">下午可能有雨</div>
    </div>

  </div>

  <!-- ========== 练习提示 ========== -->
  <div class="bg-blue-100 text-blue-700 p-3 rounded mt-4 text-sm">
    💡 <b>练习</b>：试着改一改文字、颜色（bg-red-500、text-green-500）、列数（grid-cols-2 / grid-cols-4），看效果。
  </div>

</body>
</html>
